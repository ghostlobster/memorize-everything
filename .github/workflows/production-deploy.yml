name: Deploy to Vercel (production)

# This workflow is optional.
#
# The default path is: connect the repo to Vercel via the GitHub integration
# (vercel.com → Import Project). Vercel then handles preview deploys for every
# PR and production deploys for every push to `main` automatically — no CI
# workflow needed.
#
# Use this workflow instead when you want to gate production deploys on CI
# passing (i.e. only deploy to production if `ci.yml` succeeded). It requires
# these repository secrets:
#
#   VERCEL_TOKEN            -- personal or team token
#   VERCEL_ORG_ID           -- from `.vercel/project.json` after `vercel link`
#   VERCEL_PROJECT_ID       -- ditto
#
# The workflow is disabled by default (see the `if:` on the job). Flip the
# variable `VERCEL_DEPLOY_VIA_ACTIONS = 'true'` in repo settings to enable.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    if: >
      vars.VERCEL_DEPLOY_VIA_ACTIONS == 'true' &&
      github.event.workflow_run.conclusion == 'success'
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
