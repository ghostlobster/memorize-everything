name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  # Stub values so `next build` and auth imports don't crash in CI.
  # These are NOT used to connect to anything — the build is static
  # and we're not running the app.
  DATABASE_URL: "postgresql://stub:stub@localhost:5432/stub"
  DATABASE_URL_UNPOOLED: "postgresql://stub:stub@localhost:5432/stub"
  AUTH_SECRET: "ci-placeholder-secret-not-used-at-runtime"
  AUTH_GITHUB_ID: "stub"
  AUTH_GITHUB_SECRET: "stub"
  DEFAULT_MODEL_PROVIDER: "google"
  GOOGLE_GENERATIVE_AI_API_KEY: "stub"

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        # Version is picked up from packageManager in package.json;
        # specifying it here as well causes pnpm/action-setup@v4 to
        # fail with "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage summary comment
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks can scan the PR delta cleanly.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fail the job on any finding — the local PreToolUse guard
          # should catch these first, so a CI failure means the harness
          # wasn't active (fresh clone, bypassed hook, etc.).
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  pr-hygiene:
    name: PR hygiene (ticket + title)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 2
    steps:
      - name: Conventional Commits title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            pr
            refactor
            test
            perf
            build
            ci
          requireScope: false

      - name: Check ticket reference in PR body (advisory)
        uses: actions/github-script@v7
        with:
          script: |
            // Dependabot's auto-generated PR bodies don't include a
            // `Refs #N` line. Per CONTRIBUTING.md → Dependabot triage
            // policy, patch/minor bumps from Dependabot are intended to
            // auto-merge on green CI; failing the hygiene check on
            // every Dependabot PR forces hand-edits and breaks that
            // promise. Skip when the author is dependabot[bot].
            // Spoofing requires GitHub-account-level compromise (the
            // login is set by GitHub, not by the PR body), which is
            // outside the threat model. See #51.
            const author = context.payload.pull_request.user.login;
            if (author === "dependabot[bot]") {
              core.info("Skipping hygiene check: Dependabot PR.");
              return;
            }
            const body = context.payload.pull_request.body || "";
            // Accepts: "Closes #123", "Fixes GH-123", "Ref: #4", "Refs #5",
            // or a GitHub issue URL.
            const hasIssueRef =
              /(?:closes|close|closed|fixes|fix|fixed|resolves|resolve|resolved|refs?)[\s:]*#\d+/i.test(body) ||
              /github\.com\/[^\s)]+\/issues\/\d+/i.test(body) ||
              /#\d+/.test(body);
            if (!hasIssueRef) {
              core.warning(
                "PR does not reference a ticket. Add `Closes #<n>`, `Refs #<n>`, or a GitHub issue URL to the description.",
              );
            }
