name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  # Stub values so `next build` and auth imports don't crash in CI.
  # These are NOT used to connect to anything — the build is static
  # and we're not running the app.
  DATABASE_URL: "postgresql://stub:stub@localhost:5432/stub"
  DATABASE_URL_UNPOOLED: "postgresql://stub:stub@localhost:5432/stub"
  AUTH_SECRET: "ci-placeholder-secret-not-used-at-runtime"
  AUTH_GITHUB_ID: "stub"
  AUTH_GITHUB_SECRET: "stub"
  DEFAULT_MODEL_PROVIDER: "google"
  GOOGLE_GENERATIVE_AI_API_KEY: "stub"

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage summary comment
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  pr-hygiene:
    name: PR hygiene (ticket + title)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 2
    steps:
      - name: Conventional Commits title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            build
            ci
          requireScope: false

      - name: Require ticket reference in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            // Accepts: "Closes #123", "Fixes GH-123", "Ref: #4", "Refs #5",
            // or a GitHub issue URL.
            const hasIssueRef =
              /(?:closes|close|closed|fixes|fix|fixed|resolves|resolve|resolved|refs?)[\s:]*#\d+/i.test(body) ||
              /github\.com\/[^\s)]+\/issues\/\d+/i.test(body) ||
              /#\d+/.test(body);
            if (!hasIssueRef) {
              core.setFailed(
                "PR must reference a ticket. Add `Closes #<n>`, `Refs #<n>`, or a GitHub issue URL to the description.",
              );
            }
