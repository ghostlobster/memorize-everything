version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@next/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      ai-sdk:
        patterns:
          - "ai"
          - "@ai-sdk/*"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
      auth:
        patterns:
          - "next-auth"
          - "@auth/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/test"
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
    ignore:
      # Freeze next-auth on its current Auth.js v5 beta. Dependabot
      # already skips pre-releases by default for stable-pinned
      # packages, so the only pre-release line we actually need to
      # silence is next-auth itself (currently 5.0.0-beta.30; v5
      # has been beta-only since 2024). Without this entry,
      # Dependabot would propose every beta-to-beta patch. When v5
      # stable ships, drop this entry and let the normal flow
      # propose the upgrade. See #60, #62.
      #
      # Note: a previous attempt (#61) used wildcard `versions:`
      # patterns like "*-beta*" to express this globally, but
      # `versions:` only accepts SemVer range specifiers, not
      # globs — Dependabot rejected the whole config. Keep this
      # block targeted.
      - dependency-name: "next-auth"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
