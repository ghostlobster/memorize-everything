version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@next/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      ai-sdk:
        patterns:
          - "ai"
          - "@ai-sdk/*"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
      auth:
        patterns:
          - "next-auth"
          - "@auth/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/test"
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
